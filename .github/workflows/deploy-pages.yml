name: Deploy portfolio to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/portfolio-website-design-xv3fst
    paths:
      - "portfolio/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages automatically (sets the source to GitHub Actions),
          # so no manual toggle in repo settings is required.
          enablement: true

      - name: Upload portfolio as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./portfolio

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
